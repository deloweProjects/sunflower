<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Final — Project Sunflower</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@200;300&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background: #000 url('assets/yuo.png') no-repeat center center;
            background-size: cover;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
            animation: fadeIn 3s ease both;
            z-index: 10;
            /* Ensure content is on top */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: clamp(80px, 20vw, 120px);
            height: auto;
            animation: slowSpin 30s linear infinite;
            opacity: 0.8;
        }

        @keyframes slowSpin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(18px, 6vw, 28px);
            font-weight: 300;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            margin-top: -10px;
            text-align: center;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 240px;
        }

        .menu-item {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 200;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            cursor: pointer;
            text-align: center;
            transition: all 0.6s ease;
        }

        .menu-item:hover {
            border-color: rgba(255, 255, 255, 0.6);
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }
    </style>
</head>

<body>
    <div class="container">
        <img class="logo" src="../intro/assets/sunflower.png" alt="Sunflower">
        <div class="title">SUNFLOWER</div>

        <div class="menu">
            <div class="menu-item" onclick="replay('intro')">Intro</div>
            <div class="menu-item" onclick="replay('msg1')">Message I</div>
            <div class="menu-item" onclick="replay('msg2')">Message II</div>
        </div>
    </div>

    <script>
        function replay(target) {
            window.parent.postMessage('replay-' + target, '*');
        }
    </script>
</body>

</html>
